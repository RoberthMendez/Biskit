<header
  class="flex items-center justify-between bg-[#2f3a4a] px-7.5 shadow-md h-[12.5vh]"
>
  <!-- Logo -->
  <div class="flex items-center">
    <img src="/images/marca/logoB&W.png" alt="logoB&W" class="h-14" />
  </div>

  <!-- usuario | cerrar sesión -->
  <div class="flex items-center gap-4 text-[#fcf6f0]">
    <!-- Ícono usuario + nombre -->
    <div class="flex items-center gap-2">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5 shrink-0"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
        />
      </svg>
      <h3 class="text-[1 rem] font-light text-[#fcf6f0]">
        {{ nombreUsuario }}
      </h3>
    </div>

    <!-- Divisor vertical -->
    <div class="h-5 w-px bg-[#cfcfcf4c]"></div>

    <!-- Ícono cerrar sesión -->
    <button
      title="Cerrar sesión"
      [routerLink]="['/']"
      class="flex items-center justify-center text-[#cfcfcf] transition-colors duration-200 hover:text-white cursor-pointer bg-transparent border-none p-0"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"
        />
      </svg>
    </button>
  </div>
</header>
