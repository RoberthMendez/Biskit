<a
  [routerLink]="treatmentLink"
  [state]="state ?? undefined"
  [class]="itemClasses"
>
  <div class="w-0.5 min-w-0.5 shrink-0 self-stretch bg-[#2B5392]"></div>

  <div class="flex flex-col gap-1">
    <div class="flex items-center justify-between gap-1">
      @if (variant === "vet" && showPetName !== false) {
        <p [class]="dateClasses">
          {{ petName }}
        </p>
        <span [class]="dateClasses">·</span>
      }
      <p [class]="dateClasses">
        {{ fecha | date: "dd-MM-yyyy" }}
      </p>
    </div>

    <!-- Drogas -->
    <div [class]="drugGridClasses" [style.max-height]="drugGridMaxHeight">
      @for (drugColumn of getDrugColumns(drugNames); track $index) {
        <div class="flex flex-col gap-0.5">
          @for (d of drugColumn; track $index) {
            <p class="text-sm font-medium text-[#282828] truncate">
              {{ d }}
            </p>
          }
        </div>
      }
    </div>
  </div>
</a>
