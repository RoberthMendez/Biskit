@if (renderModal) {
  <section
    class="chat-modal-backdrop fixed inset-0 z-2147483647 flex items-center justify-center bg-black/45 p-3 backdrop-blur-sm sm:p-5"
    [class.is-closing]="isExiting"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'Chat con ' + (person?.name || 'contacto')"
    (click)="requestClose()"
  >
    <div
      class="chat-modal-panel flex h-[88dvh] max-h-195 w-full max-w-6xl flex-col overflow-hidden rounded-2xl bg-[#FBFAF8] shadow-2xl"
      [class.is-closing]="isExiting"
      (click)="$event.stopPropagation()"
    >
      <header
        class="flex shrink-0 items-start justify-between gap-4 border-b border-blue-100 bg-blue-50 px-4 py-4 sm:px-6"
      >
        <div class="min-w-0">
          <div class="flex items-center gap-3">
            <span
              class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-blue-100 text-[#2B5392]"
            >
              <i class="pi pi-comments text-lg"></i>
            </span>
            <div class="min-w-0">
              <h2 class="text-xl font-bold text-gray-900 sm:text-2xl">
                {{ title }}
              </h2>
              <p class="truncate text-sm font-medium text-[#6D6155]">
                {{ subtitle }}
              </p>
            </div>
          </div>
        </div>

        <button
          type="button"
          class="flex h-10 w-10 shrink-0 cursor-pointer items-center justify-center rounded-full border border-blue-100 bg-white text-[#2B5392] transition-colors duration-200 hover:bg-[#2B5392] hover:text-white"
          aria-label="Cerrar chat"
          (click)="requestClose()"
        >
          <i class="pi pi-times text-sm"></i>
        </button>
      </header>

      <div
        class="grid min-h-0 flex-1 grid-rows-[auto_minmax(0,1fr)] lg:grid-cols-[320px_minmax(0,1fr)] lg:grid-rows-1"
      >
        <aside
          class="min-h-0 overflow-y-auto border-b border-blue-100 bg-[#FBFAF8] p-4 lg:border-r lg:border-b-0 sm:p-5 custom-scroll"
        >
          <app-chat-person-info [person]="person"></app-chat-person-info>

          <div class="mt-5 rounded-2xl border border-blue-100 bg-white p-4">
            <div class="mb-3 flex items-center gap-2 text-[#2B5392]">
              <i class="pi pi-heart-fill text-sm"></i>
              <p class="text-sm font-bold">Paciente</p>
            </div>
            <p class="wrap-break-word text-base font-bold text-[#2F3B4B]">
              {{ petName || "Mascota sin nombre" }}
            </p>
            <p class="mt-1 text-sm text-[#6D6155]">
              {{ petSummary }}
            </p>
            <p
              class="mt-3 rounded-full bg-blue-50 px-3 py-1.5 text-xs font-semibold text-[#2B5392]"
            >
              {{ treatmentDate }}
            </p>
          </div>
        </aside>

        <section class="flex min-h-0 flex-col bg-white">
          <div class="min-h-0 flex-1 overflow-y-auto p-4 sm:p-6 custom-scroll">
            <div class="flex flex-col gap-4">
              @for (message of messages; track message.id) {
                <app-chat-message [message]="message"></app-chat-message>
              }
            </div>
          </div>

          <footer
            class="shrink-0 border-t border-blue-100 bg-[#FBFAF8] p-3 sm:p-4"
          >
            <div
              class="flex items-center gap-3 rounded-2xl border border-blue-100 bg-white px-3 py-2 shadow-sm"
            >
              <input
                placeholder="Escribe un mensaje..."
                class="min-w-0 flex-1 bg-transparent px-1 py-2 text-sm font-medium text-[#8D8580] outline-none"
                [(ngModel)]="messageText"
                (keydown.enter)="sendCurrentMessage(); $event.preventDefault()"
              />
              <button
                type="button"
                [disabled]="!messageText.trim()"
                class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-[#2B5392] text-white transition-opacity disabled:cursor-not-allowed disabled:opacity-60"
                aria-label="Enviar mensaje"
                (click)="sendCurrentMessage()"
              >
                <i class="pi pi-send text-sm"></i>
              </button>
            </div>
          </footer>
        </section>
      </div>
    </div>
  </section>
}
