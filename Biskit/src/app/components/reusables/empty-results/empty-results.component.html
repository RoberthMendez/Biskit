<div
  class="mx-2 my-20 flex flex-col items-center justify-center gap-4 text-center sm:mx-10"
>
  <p class="mb-2 text-base text-[#8d8580dd]">{{ message }}</p>
  <button
    *ngIf="showButton"
    (click)="onClear()"
    class="cursor-pointer rounded-xl border border-[#6D6155]/30 bg-[#6D6155]/5 px-4 py-2 text-[#6D6155] transition-all duration-200 hover:bg-[#6D6155]/10 hover:text-[#4F453D]"
  >
    {{ buttonLabel }}
  </button>
</div>
