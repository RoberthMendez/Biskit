<!-- clients.component.html -->

<app-clients-header
  [backRoute]="isAdminView ? ['/admin', vetId ?? ''] : ['/vet', vetId ?? '']"
  [addRoute]="[basePath, 'clients', 'add']"
  [panelTitle]="isAdminView ? 'Panel de Administrador' : 'Panel de Veterinario'"
></app-clients-header>

<section class="mx-4 mb-10 sm:mx-16 md:mx-24 lg:mx-36">
  <app-clients-buscador (search)="onSearch($event)"></app-clients-buscador>

  <!-- Mensaje cuando no hay clientes -->
  @if (filteredClients.length === 0) {
    <app-empty-results
      [message]="'No hay clientes registrados en el sistema'"
      (clear)="onSearch('')"
    ></app-empty-results>
  }

  <!-- Tabla y Cards cuando hay clientes -->
  @if (filteredClients.length > 0) {
    <!-- Tabla -->
    <app-tabla
      [columnas]="columnasClient"
      [datos]="filteredClients"
      [maxHeight]="'42rem'"
      (rowClick)="onRowClick($event)"
      (actionClick)="onActionClick($event)"
    ></app-tabla>

    <!-- Cards -->
    <app-clients-cards
      [clients]="filteredClients"
      (delete)="openDelete($event)"
    >
    </app-clients-cards>
  }
</section>

<app-delete-modal
  [visible]="showModal"
  [entityLabel]="'cliente'"
  [successMessage]="deleteSuccessMessage"
  (confirm)="confirmDelete()"
  (close)="closeModal()"
>
</app-delete-modal>
