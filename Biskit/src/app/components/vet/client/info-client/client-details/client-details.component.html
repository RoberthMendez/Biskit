<article
  class="grid grid-cols-2 lg:grid-cols-3 gap-4 px-6 mx-4 lg:mx-8 xl:mx-15"
>
  <!-- CEDULA -->
  <div class="flex items-center gap-3 min-w-0">
    <div
      class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-[#F2F7FF] lg:h-14 lg:w-14 xl:h-16 xl:w-16"
    >
      <!-- svg cédula -->
    </div>
    <div class="flex flex-col min-w-0">
      <p class="text-xs font-medium text-[#8D8580] lg:text-sm">Cédula</p>
      <p class="text-sm font-semibold text-[#4A4A4A] lg:text-base truncate">
        {{ client.cedula }}
      </p>
    </div>
  </div>

  <!-- TELEFONO -->
  <div class="flex items-center gap-3 min-w-0">
    <div
      class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-[#F2F7FF] lg:h-14 lg:w-14 xl:h-16 xl:w-16"
    >
      <!-- svg teléfono -->
    </div>
    <div class="flex flex-col min-w-0">
      <p class="text-xs font-medium text-[#8D8580] lg:text-sm">Teléfono</p>
      <p class="text-sm font-semibold text-[#4A4A4A] lg:text-base truncate">
        {{ client.celular }}
      </p>
    </div>
  </div>

  <!-- CORREO -->
  <div
    class="col-span-2 lg:col-span-1 flex items-center gap-3 min-w-0 overflow-hidden"
  >
    <div
      class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-[#F2F7FF] lg:h-14 lg:w-14 xl:h-16 xl:w-16"
    >
      <!-- svg correo -->
    </div>
    <div class="flex flex-col min-w-0 flex-1 overflow-hidden">
      <p class="text-xs font-medium text-[#8D8580] lg:text-sm">Correo</p>
      <p class="text-sm font-semibold text-[#4A4A4A] lg:text-base truncate">
        {{ client.correo }}
      </p>
    </div>
  </div>
</article>
