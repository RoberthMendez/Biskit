<article
  class="mx-4 flex flex-col justify-between gap-4 lg:mx-8 lg:flex-row lg:gap-6 xl:mx-15"
>
  <div class="flex flex-col">
    <h1 class="text-2xl font-semibold text-[#4a4a4a] lg:text-3xl xl:text-4xl">
      {{ client.nombre }}
    </h1>
    <p class="text-sm font-medium text-[#8d8580dd] lg:text-base">
      Información del Cliente
    </p>
  </div>

  <app-client-actions
    [client]="client"
    (deleteClient)="onDelete($event)"
  ></app-client-actions>
</article>
