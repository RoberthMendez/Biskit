<div class="relative">
  <div
    class="calendar-card rounded-2xl bg-white p-6 shadow-[0_1px_3px_rgba(0,0,0,0.06),0_1px_8px_rgba(0,0,0,0.04)]"
    [class.calendar-modal-active]="
      modalCrearCitaAbierto || modalEliminarCitaAbierto
    "
  >
    <!-- ── Header con navegación ── -->
    <div
      class="flex flex-wrap items-center justify-between gap-3 mb-5 rounded-x"
    >
      <div class="flex items-center gap-3">
        <div
          class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-[#edf3ff] text-[#2b5392]"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </div>
        <div>
          <h2 class="m-0 text-[1.05rem] font-bold text-[#1f3557]">
            Citas Semanales
          </h2>
          <p class="mb-0 mt-px text-[0.78rem] text-[#6b7b93]">
            {{ rangoSemana }}
          </p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button
          class="flex h-8.5 w-8.5 items-center justify-center rounded-lg border border-[#c7d7f5] bg-white text-[#2b5392] shadow-[0_1px_2px_rgba(43,83,146,0.06)] transition-colors duration-150 enabled:cursor-pointer enabled:hover:bg-[#edf4ff] disabled:cursor-not-allowed disabled:opacity-40"
          (click)="semanaAnterior()"
          [disabled]="cargando"
          aria-label="Semana anterior"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <button
          class="h-8.5 rounded-lg border-[1.5px] border-[#2b5392] bg-white px-3.5 text-[0.8rem] font-semibold text-[#2b5392] transition-all duration-150 enabled:cursor-pointer enabled:hover:bg-[#2b5392] enabled:hover:text-white disabled:cursor-not-allowed disabled:opacity-35"
          (click)="irAHoy()"
          [disabled]="cargando || semanaOffset === 0"
        >
          Hoy
        </button>
        <button
          class="flex h-8.5 w-8.5 items-center justify-center rounded-lg border border-[#c7d7f5] bg-white text-[#2b5392] shadow-[0_1px_2px_rgba(43,83,146,0.06)] transition-colors duration-150 enabled:cursor-pointer enabled:hover:bg-[#edf4ff] disabled:cursor-not-allowed disabled:opacity-40"
          (click)="semanaSiguiente()"
          [disabled]="cargando"
          aria-label="Semana siguiente"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>
    </div>

    <div class="relative min-h-162.5">
      <!-- ── Loading ── -->
      @if (cargando) {
        <div
          class="absolute inset-0 z-10 flex items-center justify-center gap-2.5 rounded-xl bg-white/85 px-4 py-12 text-[0.85rem] text-[#6b7b93] backdrop-blur-[1px]"
        >
          <div
            class="h-5.5 w-5.5 animate-spin rounded-full border-2 border-[#d8e4f8] border-t-[#2b5392]"
          ></div>
          <span>Cargando citas...</span>
        </div>
      }

      <!-- ── Error ── -->
      @if (error && !cargando) {
        <div
          class="mb-4 flex items-center justify-center gap-2.5 rounded-xl border border-[#f2c6c2] bg-[#fff5f5] px-4 py-4 text-[0.85rem] text-[#b42318]"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span>No se pudieron cargar las citas.</span>
        </div>
      }

      <!-- ── Leyenda de tipos ── -->
      <div
        class="flex flex-wrap gap-1.75 border-t border-[#e8edf5] py-5 justify-center"
        [class.opacity-60]="cargando"
      >
        @for (tipo of tiposCita; track tipo) {
          <span
            class="flex items-center gap-1.25 rounded-[20px] border border-transparent px-2.25 py-0.75 text-[10.5px] font-semibold before:h-1.75 before:w-1.75 before:shrink-0 before:rounded-full before:bg-current before:opacity-[0.65] before:content-['']"
            [ngStyle]="getEstiloLeyenda(tipo)"
          >
            {{ tipo }}
          </span>
        }
      </div>

      <!-- ── FullCalendar ── -->
      <div class="calendar-shell rounded-xl border border-[#dbe5f2] bg-white">
        <div #calendarEl class="min-h-137.5"></div>
      </div>
    </div>
  </div>
</div>

@if (modalCrearCitaAbierto && slotSeleccionado && catalogosCrearCitaCargados) {
  <app-add-cita
    [slot]="slotSeleccionado"
    [vetId]="vetId"
    [tiposCita]="tiposCitaCatalogo"
    [mascotas]="mascotasCatalogo"
    (cerrar)="cerrarModalCrearCita()"
    (citaCreada)="onCitaCreada()"
  ></app-add-cita>
}

<app-delete-modal
  [visible]="modalEliminarCitaAbierto"
  [title]="'Cancelar cita'"
  [entityLabel]="'cita'"
  [message]="eliminarCitaMensaje"
  [cancelLabel]="'Volver'"
  [confirmLabel]="eliminandoCita ? 'Cancelando...' : 'Cancelar cita'"
  [busy]="eliminandoCita"
  [portalToBody]="false"
  [successMessage]="eliminarCitaSuccess"
  [successCloseDelayMs]="600"
  (close)="cerrarModalEliminarCita()"
  (confirm)="confirmarEliminarCita()"
></app-delete-modal>
