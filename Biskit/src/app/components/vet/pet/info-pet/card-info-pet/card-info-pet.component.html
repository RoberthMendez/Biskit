<aside
  class="card-mascota info-pet-card group rounded-2xl mx-auto h-auto w-full max-w-full bg-[#FBFAF8] p-3 shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1 hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)] md:max-w-xs lg:max-w-sm"
>
  <article class="h-full">
    <div class="relative overflow-hidden rounded-2xl">
      <!-- Botón de Editar -->
      <a
        [routerLink]="['/vet/pets/update', pet.id]"
        (click)="$event.stopPropagation()"
        class="group/editar absolute top-4 left-4 z-10 rounded-lg border border-white/30 bg-white/20 p-2 text-white shadow-sm backdrop-blur-md transition-all duration-200 hover:bg-white/30"
      >
        <svg
          class="h-5 transition-all duration-200 group-hover/editar:scale-105"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M21.2799 6.40005L11.7399 15.94C10.7899 16.89 7.96987 17.33 7.33987 16.7C6.70987 16.07 7.13987 13.25 8.08987 12.3L17.6399 2.75002C17.8754 2.49308 18.1605 2.28654 18.4781 2.14284C18.7956 1.99914 19.139 1.92124 19.4875 1.9139C19.8359 1.90657 20.1823 1.96991 20.5056 2.10012C20.8289 2.23033 21.1225 2.42473 21.3686 2.67153C21.6147 2.91833 21.8083 3.21243 21.9376 3.53609C22.0669 3.85976 22.1294 4.20626 22.1211 4.55471C22.1128 4.90316 22.0339 5.24635 21.8894 5.5635C21.7448 5.88065 21.5375 6.16524 21.2799 6.40005V6.40005Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M11 4H6C4.93913 4 3.92178 4.42142 3.17163 5.17157C2.42149 5.92172 2 6.93913 2 8V18C2 19.0609 2.42149 20.0783 3.17163 20.8284C3.92178 21.5786 4.93913 22 6 22H17C19.21 22 20 20.2 20 18V13"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </g>
        </svg>
      </a>

      <!-- Foto -->
      <div class="relative">
        <img
          [src]="pet.urlFoto"
          [alt]="'Foto de ' + pet.nombre"
          class="h-48 w-full object-cover object-center transition-transform duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:scale-[1.04] sm:h-56 md:h-65"
        />

        <!-- Toggle Activo / Inactivo -->
        <label
          #toggleSwitch
          (click)="$event.stopPropagation()"
          class="toggle-switch absolute bottom-3 left-1/2 z-20 flex w-fit -translate-x-1/2 cursor-pointer items-center rounded-full bg-[#FBFAF8] px-1 py-1 shadow-sm"
        >
          <input
            #toggleInput
            [id]="'interruptor-' + pet.id"
            type="checkbox"
            [checked]="pet.estado === true"
            (change)="onToggleEstado($event)"
            class="peer hidden"
          />
          <span
            aria-hidden="true"
            class="toggle-pill absolute top-1 bottom-1 rounded-full bg-[#EDEDED] transition-all duration-300 ease-in-out"
          ></span>
          <span
            class="select-none toggle-inactive relative z-10 rounded-full px-3 py-1 text-xs font-semibold tracking-wide text-[#5F5F5F] transition-all duration-300 ease-in-out peer-checked:font-normal peer-checked:text-[#6B6B6B]"
          >
            Inactivo
          </span>
          <span
            class="select-none toggle-active relative z-10 rounded-full px-3 py-1 text-xs font-normal tracking-wide text-[#6B6B6B] transition-all duration-300 ease-in-out peer-checked:font-medium peer-checked:text-[#2BAB60]"
          >
            Activo
          </span>
        </label>
      </div>
    </div>

    <!-- Nombre y Raza -->
    <div class="mx-2 mt-3 mb-5 flex items-center justify-between sm:mx-4">
      <h3
        class="text-lg leading-none font-bold tracking-wider text-[#4a4a4a] sm:text-xl"
      >
        {{ pet.nombre }}
      </h3>
      <p class="text-xs leading-none font-medium text-[#6D6155]">
        {{ pet.raza.especie.nombre }} · {{ pet.raza.nombre }}
      </p>
    </div>

    <!-- Edad y Peso -->
    <div
      class="mx-2 my-3 flex items-center justify-center gap-3 sm:mx-4 sm:gap-5"
    >
      <!-- Edad -->
      <aside class="flex flex-col items-center gap-1">
        <svg
          class="h-4"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M14 22H10C6.22876 22 4.34315 22 3.17157 20.8284C2 19.6569 2 17.7712 2 14V12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C22 6.34315 22 8.22876 22 12V14C22 17.7712 22 19.6569 20.8284 20.8284C20.1752 21.4816 19.3001 21.7706 18 21.8985"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
            <path
              d="M7 4V2.5"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
            <path
              d="M17 4V2.5"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
            <path
              d="M21.5 9H16.625H10.75M2 9H5.875"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
          </g>
        </svg>
        <p class="text-xs font-semibold text-[#8D8580]">EDAD</p>
        <p class="text-xs font-medium text-[#282828]">
          {{ getEdad(pet.fechaNacimiento) }}
          {{ getEdad(pet.fechaNacimiento) === 1 ? "año" : "años" }}
        </p>
      </aside>

      <!-- Peso -->
      <aside class="flex flex-col items-center gap-1">
        <svg
          class="h-4"
          viewBox="0 0 512 512"
          xmlns="http://www.w3.org/2000/svg"
          fill="#000000"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <rect
              x="48"
              y="48"
              width="416"
              height="416"
              rx="96"
              fill="none"
              stroke="#2B5392"
              stroke-linejoin="round"
              stroke-width="32"
            ></rect>
            <path
              d="M388.94,151.56c-24.46-22.28-68.72-51.4-132.94-51.4s-108.48,29.12-132.94,51.4A34.66,34.66,0,0,0,120,199.64l33.32,39.21a26.07,26.07,0,0,0,33.6,5.21c15.92-9.83,40.91-21.64,69.1-21.64s53.18,11.81,69.1,21.64a26.07,26.07,0,0,0,33.6-5.21L392,199.64A34.66,34.66,0,0,0,388.94,151.56Z"
              fill="none"
              stroke="#2B5392"
              stroke-linejoin="round"
              stroke-width="32"
            ></path>
          </g>
        </svg>
        <p class="text-xs font-semibold text-[#8D8580]">PESO</p>
        <p class="text-xs font-medium text-[#282828]">{{ pet.peso }} Kg</p>
      </aside>
    </div>

    <hr class="mx-2 my-5 border-t border-[#6D6155] opacity-40 sm:mx-4" />

    <!-- Diagnóstico -->
    <div class="mx-2 flex flex-col items-center justify-center gap-1 sm:mx-4">
      <svg
        class="h-4"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g
          id="SVGRepo_tracerCarrier"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></g>
        <g id="SVGRepo_iconCarrier">
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M8 3C8 4.10457 7.10457 5 6 5C5.36522 5 4.7995 4.70426 4.43312 4.24305L3.68377 4.49284C3.26354 4.63291 3.04437 4.9938 3.07687 5.34291C3.21171 6.79144 3.57308 9.0342 4.50664 10.8852C5.42593 12.7078 6.80542 14 8.99998 14C11.1945 14 12.574 12.7078 13.4933 10.8852C14.4269 9.0342 14.7883 6.79144 14.9231 5.3429C14.9556 4.9938 14.7365 4.63291 14.3162 4.49284L13.5669 4.24305C13.2005 4.70426 12.6348 5 12 5C10.8954 5 10 4.10457 10 3C10 1.89543 10.8954 1 12 1C12.8308 1 13.5433 1.50659 13.8455 2.22772L14.9487 2.59547C16.1618 2.99985 17.0416 4.16308 16.9145 5.52828C16.7719 7.06027 16.3817 9.59971 15.2791 11.7858C14.2796 13.7674 12.6201 15.5771 9.97404 15.9358C10.0144 16.4923 10.1026 17.1152 10.2753 17.7292C10.5254 18.6186 10.9354 19.4287 11.5733 20.0119C12.1909 20.5765 13.0987 20.9999 14.5001 20.9999C15.9014 20.9999 16.8093 20.5765 17.4268 20.0119C18.0648 19.4286 18.4747 18.6186 18.7249 17.7292C19.0249 16.6625 19.0693 15.5564 19.0521 14.8472C17.8598 14.4504 17 13.3256 17 12C17 10.3431 18.3432 9 20 9C21.6569 9 23 10.3431 23 12C23 13.2868 22.1899 14.3843 21.0518 14.8104C21.0711 15.6368 21.0261 16.9341 20.6502 18.2707C20.3378 19.3812 19.7791 20.5712 18.7764 21.4879C17.7533 22.4233 16.3487 22.9999 14.5001 22.9999C12.6515 22.9999 11.2468 22.4233 10.2238 21.4879C9.22107 20.5712 8.66231 19.3812 8.34997 18.2707C8.11685 17.4418 8.01127 16.6232 7.9691 15.9278C5.35608 15.5511 3.71316 13.7532 2.72091 11.7858C1.61832 9.5997 1.22808 7.06026 1.08548 5.52828C0.958397 4.16308 1.83818 2.99985 3.05131 2.59547L4.15456 2.22772C4.45669 1.50659 5.16919 1 6 1C7.10457 1 8 1.89543 8 3ZM20 13.0283C19.4321 13.0283 18.9717 12.5679 18.9717 12C18.9717 11.4321 19.4321 10.9717 20 10.9717C20.5679 10.9717 21.0283 11.4321 21.0283 12C21.0283 12.5679 20.5679 13.0283 20 13.0283Z"
            fill="#b33333"
          ></path>
        </g>
      </svg>
      <p class="text-xs font-semibold text-[#8D8580]">DIAGNÓSTICO</p>
      <p class="text-xs font-medium text-[#282828]">
        {{ pet.enfermedad.nombre }}
      </p>
    </div>
  </article>
</aside>
