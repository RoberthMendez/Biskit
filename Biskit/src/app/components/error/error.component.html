<body
  class="min-h-screen font-[Inter,sans-serif] bg-white flex items-center justify-center"
>
  <div class="text-center px-10">
    <h1
      class="text-[38px] sm:text-[44px] leading-[1.1] font-semibold text-[#4a4a4a]"
    >
      Error
    </h1>

    <h2 class="mt-4 text-[18px] text-[#7d7773] font-semibold">
      {{ mensaje }}
    </h2>
    <!-- Icono de Error -->
    <img
      src="images/error/error.png"
      alt="Error"
      class="mx-auto mb-6 h-64 opacity-80"
    />
    <!-- Botón de Volver -->
    <div class="mt-6 flex justify-center">
      <a
        routerLink="/"
        class="border group inline-flex justify-start items-center h-10 rounded-lg px-3 py-2 text-[#2B5392] border-[#2B5392] hover:bg-[#2B5392] hover:text-[#FBFAF8] transition-colors duration-200"
      >
        <svg
          class="h-9 mt-1"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M8 12L16 12"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>

          <path
            d="M11 9L8.08704 11.913C8.03897 11.961 8.03897 12.039 8.08704 12.087L11 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
        </svg>

        <h2 class="font-bold tracking-wider text-base sm:text-sm">
          Página Principal
        </h2>
      </a>
    </div>
  </div>
</body>
