<article
  class="group flex h-full flex-col items-center gap-2.5 rounded-2xl border border-[#ece1d6] bg-[#FBFAF8] px-4.5 py-6.5 shadow-[0_4px_14px_rgba(29,48,75,0.06),0_1px_3px_rgba(0,0,0,0.04)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1.25 hover:border-[#d4c4b4] hover:bg-[#fffdf9] hover:shadow-[0_10px_22px_rgba(43,83,146,0.1),0_4px_8px_rgba(0,0,0,0.05)]"
>
  <div
    class="inline-flex h-13 w-13 items-center justify-center rounded-full bg-[#e9eef7] [&_svg]:h-6.5 [&_svg]:w-6.5"
    aria-hidden="true"
  >
    @switch (icono) {
      @case ("correo") {
        <svg
          class="h-5 w-auto sm:h-5 md:h-7"
          viewBox="0 0 32 32"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
        >
          <path
            stroke="#2b5392"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 9a2 2 0 012-2h22a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
          ></path>
          <path
            stroke="#2b5392"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 9l11.862 8.212a2 2 0 002.276 0L29 9"
          ></path>
        </svg>
      }
      @case ("whatsapp") {
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M19.5 12C19.5 16.14 16.14 19.5 12 19.5C10.6 19.5 9.28 19.13 8.14 18.47L4.5 19.5L5.53 15.86C4.87 14.72 4.5 13.4 4.5 12C4.5 7.86 7.86 4.5 12 4.5C16.14 4.5 19.5 7.86 19.5 12Z"
            stroke="#2B5392"
            stroke-width="1.6"
            stroke-linejoin="round"
          />
        </svg>
      }
      @case ("horarios") {
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="7" stroke="#2B5392" stroke-width="1.6" />
          <path
            d="M12 8V12L14.5 13.5"
            stroke="#2B5392"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      }
    }
  </div>
  <h3
    class="text-lg font-bold text-[#4a4a4a] transition-colors duration-300 group-hover:text-[#2b5392]"
  >
    {{ titulo }}
  </h3>
  <p
    class="w-full max-w-full truncate text-center text-[1.1rem] text-[#6d6155]"
  >
    {{ descripcion }}
  </p>
</article>
