<a
  [routerLink]="['/admin', adminId]"
  class="back-link group mt-2 mb-2 inline-flex h-10 max-w-full items-center justify-start sm:mt-6"
>
  <svg
    class="mt-1 h-9"
    viewBox="0 0 24 24"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
  >
    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
    <g
      id="SVGRepo_tracerCarrier"
      stroke-linecap="round"
      stroke-linejoin="round"
    ></g>
    <g id="SVGRepo_iconCarrier">
      <path
        d="M8 12L16 12"
        stroke="#6B6B6B"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></path>
      <path
        d="M11 9L8.08704 11.913V11.913C8.03897 11.961 8.03897 12.039 8.08704 12.087V12.087L11 15"
        stroke="#6B6B6B"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></path>
    </g>
  </svg>
  <h2
    class="truncate text-sm font-bold tracking-wider text-[#4a4a4acc] underline underline-offset-4 transition-colors duration-300 group-hover:text-[#4A4A4Aee] sm:text-base md:text-lg"
  >
    Dashboard Administrador
  </h2>
</a>
<!-- clients-header.component.html -->
<section
  class="mt-3 mb-5 grid grid-cols-1 gap-4 sm:mt-4 sm:mb-7 sm:grid-cols-2"
>
  <div class="text-[#4a4a4a]">
    <h1
      class="text-xl font-semibold tracking-wider sm:text-2xl md:text-3xl lg:text-4xl"
    >
      Veterinarios Registrados
    </h1>
    <p class="text-xs sm:text-sm md:text-base text-[#8d8580dd]">
      Lista de todos los Veterinarios de la Veterinaria
    </p>
  </div>

  <div class="flex items-center justify-start sm:justify-end">
    <a
      [routerLink]="['/admin', adminId, 'vets', 'add']"
      class="flex w-full cursor-pointer items-center justify-center gap-2 rounded-lg border border-[#2B5392] px-3 py-2 text-sm text-[#2B5392] transition-colors duration-200 hover:bg-[#2B5392] hover:text-white sm:w-auto sm:text-base"
    >
      <svg
        class="h-5 w-auto sm:h-6"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g
          id="SVGRepo_tracerCarrier"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></g>
        <g id="SVGRepo_iconCarrier">
          <g id="Edit / Add_Plus">
            <path
              id="Vector"
              d="M6 12H12M12 12H18M12 12V18M12 12V6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </g>
        </g>
      </svg>
      Agregar Veterinario
    </a>
  </div>
</section>
