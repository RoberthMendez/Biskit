<!-- clients-header.component.html -->
<section
  class="mt-3 mb-5 grid grid-cols-1 gap-4 sm:mt-4 sm:mb-7 sm:grid-cols-2"
>
  <div class="text-[#4a4a4a]">
    <h1
      class="text-xl font-semibold tracking-wider sm:text-2xl md:text-3xl lg:text-4xl"
    >
      Veterinarios Registrados
    </h1>
    <p class="text-xs sm:text-sm md:text-base text-[#8d8580dd]">
      Lista de todos los Veterinarios de la Veterinaria
    </p>
  </div>

  <div class="flex items-center justify-start gap-3 sm:justify-end">
    @if (hayFiltrosActivos) {
      <button
        type="button"
        (click)="limpiarFiltros.emit()"
        class="cursor-pointer flex items-center gap-2 rounded-lg border border-[#d4c5b9] bg-white px-3 py-2 text-sm text-[#6D6155] transition-colors duration-200 hover:bg-[#f5ede3]"
        aria-label="Limpiar filtros"
        title="Limpiar filtros"
      >
        <svg
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M6 6L18 18M18 6L6 18"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
        <span class="font-medium">Limpiar</span>
      </button>
    }

    <!-- Botón Filtros -->
    <app-boton-filtros
      [tipo]="'vets'"
      [isAdminView]="true"
      (filtrosAplicados)="onFiltrosAplicados($event)"
      (filtrosActivosChange)="onFiltrosActivosChange($event)"
    ></app-boton-filtros>

    <!-- Agregar Veterinario -->
    <a
      [routerLink]="['/admin', adminId, 'vets', 'add']"
      class="flex w-full cursor-pointer items-center justify-center gap-2 rounded-lg border border-[#2B5392] px-3 py-2 text-sm text-[#2B5392] transition-colors duration-200 hover:bg-[#2B5392] hover:text-white sm:w-auto sm:text-base"
    >
      <svg
        class="h-5 w-auto sm:h-6"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g
          id="SVGRepo_tracerCarrier"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></g>
        <g id="SVGRepo_iconCarrier">
          <g id="Edit / Add_Plus">
            <path
              id="Vector"
              d="M6 12H12M12 12H18M12 12V18M12 12V6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </g>
        </g>
      </svg>
      Agregar Veterinario
    </a>
  </div>
</section>
