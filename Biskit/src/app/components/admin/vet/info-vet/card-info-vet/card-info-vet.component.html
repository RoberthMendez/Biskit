<aside
  class="card-vet-info group mx-auto h-auto w-full max-w-full rounded-2xl bg-[#FBFAF8] p-3 shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1 hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)] md:max-w-xs lg:max-w-sm"
>
  <article class="h-full">
    <div class="relative overflow-hidden rounded-2xl">
      <div class="absolute top-4 left-4 z-10 flex gap-2">
        <a
          [routerLink]="['/admin', adminId, 'vets', 'update', vet.id]"
          [state]="estadoEdicion"
          (click)="$event.stopPropagation()"
          class="group/editar inline-flex items-center justify-center rounded-lg border border-white/30 bg-white/20 p-2 text-white shadow-sm backdrop-blur-md transition-all duration-200 hover:bg-white/30"
          aria-label="Editar veterinario"
        >
          <svg
            class="h-5 transition-all duration-200 group-hover/editar:scale-105"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M21.2799 6.40005L11.7399 15.94C10.7899 16.89 7.96987 17.33 7.33987 16.7C6.70987 16.07 7.13987 13.25 8.08987 12.3L17.6399 2.75002C17.8754 2.49308 18.1605 2.28654 18.4781 2.14284C18.7956 1.99914 19.139 1.92124 19.4875 1.9139C19.8359 1.90657 20.1823 1.96991 20.5056 2.10012C20.8289 2.23033 21.1225 2.42473 21.3686 2.67153C21.6147 2.91833 21.8083 3.21243 21.9376 3.53609C22.0669 3.85976 22.1294 4.20626 22.1211 4.55471C22.1128 4.90316 22.0339 5.24635 21.8894 5.5635C21.7448 5.88065 21.5375 6.16524 21.2799 6.40005V6.40005Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M11 4H6C4.93913 4 3.92178 4.42142 3.17163 5.17157C2.42149 5.92172 2 6.93913 2 8V18C2 19.0609 2.42149 20.0783 3.17163 20.8284C3.92178 21.5786 4.93913 22 6 22H17C19.21 22 20 20.2 20 18V13"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </a>

        <button
          type="button"
          (click)="$event.stopPropagation(); onDelete?.(vet.id!)"
          class="group/eliminar inline-flex cursor-pointer items-center justify-center rounded-lg border border-white/30 bg-white/20 p-2 text-white shadow-sm backdrop-blur-md transition-all duration-200 hover:bg-white/30"
          aria-label="Eliminar veterinario"
        >
          <svg
            class="h-5 transition-all duration-200 group-hover/eliminar:scale-105"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M3 6H5H21"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6M19 6L18.1327 19.1425C18.0579 20.1891 17.187 21 16.1378 21H7.86224C6.81296 21 5.94208 20.1891 5.86732 19.1425L5 6H19Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>
      </div>

      <img
        [src]="vet.urlFoto || '/images/add-vet/default-vet.png'"
        [alt]="vet.nombre"
        class="h-56 w-full object-cover object-center transition-transform duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:scale-[1.04] sm:h-64 md:h-72"
      />
      @if (vet.estado === true) {
        <span
          class="absolute top-2 right-2 rounded-md bg-[#E1F8EA] px-3 py-1 font-medium text-[#2BAB60]"
        >
          ACTIVO
        </span>
      }
      @if (vet.estado === false) {
        <span
          class="absolute top-2 right-2 rounded-md bg-[#EDEDED] px-3 py-1 font-medium text-[#6B6B6B]"
        >
          INACTIVO
        </span>
      }
    </div>

    <div
      class="mx-2 mt-3 mb-5 flex flex-col items-center justify-center gap-1 sm:mx-4"
    >
      <h3
        class="truncate text-center text-lg font-bold tracking-wider text-[#4a4a4a] sm:text-xl"
      >
        {{ vet.nombre }}
      </h3>
      <p
        class="truncate text-center text-xs font-medium leading-normal text-[#6D6155]"
      >
        Especialidad: {{ vet.especialidad.nombre }}
      </p>
    </div>
    <div class="mx-2 my-3 flex flex-col sm:mx-4">
      <div class="divider h-px bg-[#ece9e4]"></div>

      <div class="flex items-center gap-3 px-3 py-3">
        <div
          class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-[#e8eef7]"
        >
          <svg
            class="h-4 w-auto sm:h-4 md:h-6"
            viewBox="0 -0.5 25 25"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M3.5 7V17C3.5 18.1046 4.39543 19 5.5 19H19.5C20.6046 19 21.5 18.1046 21.5 17V7C21.5 5.89543 20.6046 5 19.5 5H5.5C4.39543 5 3.5 5.89543 3.5 7Z"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M15.5 10H18.5"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
            <path
              d="M15.5 13H18.5"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M11.5 10C11.5 11.1046 10.6046 12 9.5 12C8.39543 12 7.5 11.1046 7.5 10C7.5 8.89543 8.39543 8 9.5 8C10.0304 8 10.5391 8.21071 10.9142 8.58579C11.2893 8.96086 11.5 9.46957 11.5 10Z"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M5.5 16C8.283 12.863 11.552 13.849 13.5 16"
              stroke="#2B5392"
              stroke-width="1.5"
              stroke-linecap="round"
            ></path>
          </svg>
        </div>
        <div>
          <p
            class="text-[10px] font-medium tracking-widest uppercase text-[#8d8580]"
          >
            Cédula
          </p>
          <p class="text-[12px] font-medium text-[#2b3a4a]">{{ vet.cedula }}</p>
        </div>
      </div>

      <div class="h-px bg-[#ece9e4]"></div>

      <div class="flex items-center gap-3 px-3 py-3">
        <div
          class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-[#e8eef7]"
        >
          <svg
            class="h-4 w-auto sm:h-4 md:h-6"
            viewBox="0 0 32 32"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
          >
            <path
              stroke="#2b5392"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 9a2 2 0 012-2h22a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
            ></path>
            <path
              stroke="#2b5392"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 9l11.862 8.212a2 2 0 002.276 0L29 9"
            ></path>
          </svg>
        </div>
        <div class="min-w-0">
          <p
            class="text-[10px] font-medium tracking-widest uppercase text-[#8d8580]"
          >
            Correo
          </p>
          <p class="max-w-45 truncate text-[12px] font-medium text-[#2b3a4a]">
            {{ vet.correo }}
          </p>
        </div>
      </div>
    </div>
  </article>
</aside>
