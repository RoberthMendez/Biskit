<article
  class="bg-[#FBFAF8] py-6 sm:py-8 lg:py-10 px-5 sm:px-6 lg:px-8 rounded-2xl border border-[#E0E0E0] flex items-center flex-row gap-4 sm:gap-6 lg:gap-8 w-full sm:min-w-70"
>
  <div class="rounded-full bg-[#e8eef7] p-4 shrink-0">
    @if (titulo === "VENTAS TOTALES") {
      <svg
        class="h-9 w-9 sm:h-11 sm:w-11"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
      >
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g
          id="SVGRepo_tracerCarrier"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></g>
        <g id="SVGRepo_iconCarrier">
          <path
            stroke="#2b5392"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M20.5 7.5L13 15l-4-4-6 6M16 7h4.95v5"
          ></path>
        </g>
      </svg>
    } @else if (titulo === "GANANCIAS TOTALES") {
      <svg
        class="w-9 h-9 sm:w-11 sm:h-11"
        fill="#2b5392"
        viewBox="0 0 16 16"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g
          id="SVGRepo_tracerCarrier"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></g>
        <g id="SVGRepo_iconCarrier">
          <path
            d="M12.32 8a3 3 0 0 0-2-.7H5.63A1.59 1.59 0 0 1 4 5.69a2 2 0 0 1 0-.25 1.59 1.59 0 0 1 1.63-1.33h4.62a1.59 1.59 0 0 1 1.57 1.33h1.5a3.08 3.08 0 0 0-3.07-2.83H8.67V.31H7.42v2.3H5.63a3.08 3.08 0 0 0-3.07 2.83 2.09 2.09 0 0 0 0 .25 3.07 3.07 0 0 0 3.07 3.07h4.74A1.59 1.59 0 0 1 12 10.35a1.86 1.86 0 0 1 0 .34 1.59 1.59 0 0 1-1.55 1.24h-4.7a1.59 1.59 0 0 1-1.55-1.24H2.69a3.08 3.08 0 0 0 3.06 2.73h1.67v2.27h1.25v-2.27h1.7a3.08 3.08 0 0 0 3.06-2.73v-.34A3.06 3.06 0 0 0 12.32 8z"
          ></path>
        </g>
      </svg>
    }
  </div>

  <div class="flex flex-col justify-center gap-1">
    <p class="text-[#8d8580] text-xs font-semibold tracking-widest uppercase">
      {{ titulo }}
    </p>
    <h4 class="text-2xl sm:text-3xl font-bold text-[#4a4a4a] leading-tight">
      ${{ valorFormateado }}
    </h4>
  </div>
</article>
