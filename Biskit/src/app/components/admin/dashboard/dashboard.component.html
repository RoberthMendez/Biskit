<main
  class="flex flex-col gap-8 sm:gap-10 my-8 sm:my-10 mx-4 sm:mx-8 md:mx-12 lg:mx-16 xl:mx-24 2xl:mx-30"
>
  <!-- Titulo -->
  <section
    *ngIf="adminLoaded"
    class="relative flex flex-col items-center gap-2 text-[#4a4a4a] w-full"
  >
    <h1
      class="text-center text-xl font-black tracking-wider text-[#4a4a4a] sm:text-3xl md:text-4xl"
    >
      Hola de nuevo {{ admin.nombre }}!
    </h1>

    <p class="text-center text-sm font-medium text-[#8d8580dd]">
      Aquí puedes ver un resumen de las estadísticas de Biskit
    </p>

    <button
      (click)="descargarReporteUltimoMes()"
      class="cursor-pointer rounded-full bg-[#e8eef7] px-5 py-2.5 text-sm font-semibold text-[#2b5392] shadow-sm transition hover:bg-[#dbe7f6] sm:px-6 sm:py-3 lg:absolute lg:right-4 lg:top-1/2 lg:-translate-y-1/2"
    >
      Reporte del Mes
    </button>
  </section>
  <!-- Ventas, Mascotas y Veterinarios -->
  <section
    class="flex flex-col xl:flex-row justify-around items-center gap-6 lg:gap-8 xl:gap-10"
  >
    <article class="flex flex-col gap-6 sm:gap-8 w-full md:w-[48%] xl:w-auto">
      <app-card-kpi
        class="w-full"
        [titulo]="'VENTAS TOTALES'"
        [valor]="ventasTotales"
      ></app-card-kpi>
      <app-card-kpi
        class="w-full"
        [titulo]="'GANANCIAS TOTALES'"
        [valor]="gananciasTotales"
      ></app-card-kpi>
    </article>
    <app-card-dona
      class="w-full md:w-[48%] xl:w-[30%]"
      [titulo]="'MASCOTAS'"
      [total]="numMascotas"
      [data]="[numMascotasActivas, numMascotasInactivas]"
    ></app-card-dona>
    <app-card-dona
      class="w-full md:w-[48%] xl:w-[30%]"
      [titulo]="'VETERINARIOS'"
      [total]="numVeterinarios"
      [data]="[numVeterinariosActivos, numVeterinariosInactivos]"
    ></app-card-dona>
  </section>
  <!-- Tratamientos por mes (Gráfico de Barras) -->
  <section class="flex justify-center items-center">
    <app-card-barras class="w-full" [tratamientos]="tratamientosMes">
    </app-card-barras>
  </section>
  <!-- Tops 5 -->
  <section
    class="flex flex-col xl:flex-row justify-around items-stretch xl:items-center gap-6 lg:gap-8 xl:gap-10"
  >
    <app-card-top5
      class="w-full xl:w-1/2"
      [top]="top5Drogas"
      [titulo]="'Drogas'"
    >
    </app-card-top5>
    <app-card-top5
      class="w-full xl:w-1/2"
      [top]="top5Enfermedades"
      [titulo]="'Enfermedades'"
    >
    </app-card-top5>
  </section>
  <!--  -->
  <section
    class="flex flex-col xl:flex-row justify-around items-stretch gap-6 lg:gap-8 xl:gap-10"
  >
    <app-card-tabla class="w-full xl:w-1/2" [datos]="drogaTratamientosMesCount">
    </app-card-tabla>
    <app-card-repuestos class="w-full xl:w-1/2" [drogas]="drogasBajasEnStock">
    </app-card-repuestos>
  </section>
</main>
