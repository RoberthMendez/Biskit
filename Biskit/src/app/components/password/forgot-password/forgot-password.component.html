<main class="min-h-screen">
  <section
    class="screen-enter grid min-h-screen w-full grid-cols-1 lg:grid-cols-2"
  >
    <!-- IZQUIERDA -->
    <div class="relative flex w-full flex-col justify-center py-10">
      <div class="flex w-full px-10 sm:px-18 lg:px-26">
        <div class="screen-enter-stagger w-full max-w-md">
          <h1
            class="text-[38px] leading-[1.1] font-semibold text-[#4a4a4a] sm:text-[44px]"
          >
            Cambio de contraseña
          </h1>

          <p class="mt-4 text-[15px] font-semibold text-[#8d8580dd]">
            Ingresa tu usuario y te enviaremos un enlace para restablecer tu
            contraseña de forma segura.
          </p>

          <form
            (ngSubmit)="onSubmit()"
            class="screen-enter-stagger mt-6 space-y-7"
            autocomplete="on"
          >
            <!-- Usuario -->
            <div class="relative">
              <input
                id="usuario"
                type="text"
                name="usuario"
                [(ngModel)]="usuario"
                required
                placeholder=" "
                class="peer w-full border-0 border-b border-gray-300 bg-transparent px-0 pt-6 pb-2 text-gray-900 outline-none focus:border-gray-800 focus:ring-0"
              />

              <label
                for="usuario"
                class="absolute top-2 left-0 cursor-text text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-sm peer-focus:text-gray-600"
              >
                Usuario
              </label>
            </div>

            <!-- Botón + link -->
            <div class="flex flex-col items-start space-y-3 pt-2">
              <button
                type="submit"
                [disabled]="loading"
                class="h-12 w-44 flex items-center justify-center gap-2 rounded-full font-medium text-white shadow-[0_10px_25px_rgba(120,169,215,0.35)] transition-all duration-300 bg-[#2b5392] hover:bg-[#1a3a6b] cursor-pointer disabled:bg-gray-400 disabled:hover:bg-gray-400 disabled:cursor-not-allowed disabled:shadow-none"
              >
                @if (loading) {
                  <span
                    class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
                  ></span>
                }
                {{ loading ? "Enviando..." : "Enviar correo" }}
              </button>

              <a
                routerLink="/login"
                class="cursor-pointer text-sm font-medium text-[#2b5392] transition-all duration-200 hover:text-[#1a3a6b] hover:underline"
              >
                Volver al inicio de sesión
              </a>
            </div>

            <!-- Error -->
            @if (error) {
              <p
                class="w-full rounded-md border border-[#B22222] bg-[#FEE2E2] px-5 py-4 text-sm text-[#B22222]"
              >
                {{ error }}
              </p>
            }

            <!-- Éxito -->
            @if (success) {
              <p
                class="w-full rounded-md border border-[#166534] bg-[#DCFCE7] px-5 py-4 text-sm text-[#166534]"
              >
                Te hemos enviado un correo con las instrucciones para
                restablecer tu contraseña.
              </p>
            }
          </form>
        </div>
      </div>
    </div>

    <!-- DERECHA -->
    <app-login-image></app-login-image>
  </section>
</main>
