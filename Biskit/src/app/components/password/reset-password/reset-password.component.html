<div
  class="screen-enter flex min-h-screen items-center justify-center px-4 py-8 sm:px-6 lg:px-8"
>
  <article
    class="screen-enter-stagger w-full max-w-lg overflow-hidden rounded-3xl border border-gray-100 bg-white shadow-[0_20px_60px_-15px_rgba(0,0,0,0.12)]"
  >
    <!-- Header -->
    <div class="flex items-center gap-4 bg-[#F6F7F8] px-6 py-6 sm:px-8">
      <div
        class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white shadow-sm"
      >
        <img
          src="/images/marca/icono.png"
          alt="icono"
          class="h-7 w-7 object-contain"
        />
      </div>

      <div class="flex flex-col">
        <h2 class="text-xl font-bold tracking-wide text-[#4A4A4A] sm:text-2xl">
          Restablecer contraseña
        </h2>

        <p class="mt-1 text-xs font-medium text-[#8D8580] sm:text-sm">
          Ingresa y confirma tu nueva contraseña
        </p>
      </div>
    </div>

    <!-- Body -->
    <div class="w-full bg-[#FBFAF8] px-6 py-6 sm:px-8 sm:py-8">
      @if (errorMessage) {
        <p
          class="mb-5 rounded-2xl border border-red-100 bg-red-50 px-4 py-3 text-sm font-medium text-red-600"
        >
          {{ errorMessage }}
        </p>
      }

      @if (successMessage) {
        <p
          class="mb-5 rounded-2xl border border-green-100 bg-green-50 px-4 py-3 text-sm font-medium text-green-700"
        >
          {{ successMessage }}
        </p>
      }

      <form class="space-y-5" (ngSubmit)="resetPassword()">
        <!-- Nueva contraseña -->
        <div>
          <label class="mb-2 block text-sm font-semibold text-[#4A4A4A]">
            Nueva contraseña
          </label>

          <input
            [(ngModel)]="nuevaPassword"
            name="nuevaPassword"
            type="password"
            placeholder="Ingresa tu nueva contraseña"
            [disabled]="loading"
            class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-[#2b5392] focus:ring-4 focus:ring-[#2b5392]/10"
          />
        </div>

        <!-- Confirmar contraseña -->
        <div>
          <label class="mb-2 block text-sm font-semibold text-[#4A4A4A]">
            Confirmar contraseña
          </label>

          <input
            [(ngModel)]="confirmarPassword"
            name="confirmarPassword"
            type="password"
            placeholder="Repite tu nueva contraseña"
            [disabled]="loading"
            class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-[#2b5392] focus:ring-4 focus:ring-[#2b5392]/10"
          />
        </div>

        <!-- Botón -->
        <button
          type="submit"
          [disabled]="loading"
          class="mt-2 flex w-full cursor-pointer items-center justify-center gap-2 rounded-2xl bg-[#2b5392] py-3 text-sm font-semibold text-white shadow-md transition duration-200 hover:bg-[#1f4379] hover:shadow-lg active:scale-[0.98] disabled:cursor-not-allowed disabled:bg-gray-400 disabled:shadow-none"
        >
          @if (loading) {
            <span
              class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
            ></span>
          }
          <span>{{
            loading ? "Restableciendo..." : "Restablecer contraseña"
          }}</span>
        </button>

        <p class="pt-1 text-center text-sm leading-relaxed text-[#8D8580]">
          Tu contraseña se actualizará de forma segura en el sistema.
        </p>
      </form>
    </div>
  </article>
</div>
