<form
  (ngSubmit)="onSubmit()"
  class="screen-enter-stagger relative mt-6 max-w-md space-y-9"
  autocomplete="on"
>
  <div class="relative">
    <input
      id="usuario"
      type="text"
      name="usuario"
      [(ngModel)]="usuario"
      required
      placeholder=" "
      class="peer w-full border-0 border-b border-gray-300 bg-transparent px-0 pt-6 pb-2 text-gray-900 outline-none focus:border-gray-800 focus:ring-0"
    />
    <label
      for="usuario"
      class="absolute top-2 left-0 cursor-text text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-sm peer-focus:text-gray-600"
    >
      Usuario
    </label>
  </div>

  <div class="relative">
    <input
      id="contrasena"
      [type]="mostrarContrasena ? 'text' : 'password'"
      name="contrasena"
      [(ngModel)]="contrasena"
      required
      placeholder=" "
      class="peer w-full border-0 border-b border-gray-300 bg-transparent px-0 pt-6 pr-12 pb-2 text-gray-900 outline-none focus:border-gray-800 focus:ring-0"
    />
    <label
      for="contrasena"
      class="absolute top-2 left-0 cursor-text text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-sm peer-focus:text-gray-600"
    >
      Contraseña
    </label>
    @if (contrasena) {
      <button
        type="button"
        class="absolute right-0 bottom-2 flex h-9 w-9 cursor-pointer items-center justify-center rounded-full text-gray-500 transition-colors hover:text-gray-800 focus-visible:ring-2 focus-visible:ring-[#2b5392] focus-visible:ring-offset-2 focus-visible:outline-none"
        (click)="mostrarContrasena = !mostrarContrasena"
        [attr.aria-label]="
          mostrarContrasena ? 'Ocultar contraseña' : 'Mostrar contraseña'
        "
        [attr.aria-pressed]="mostrarContrasena"
      >
        <i
          class="pi text-base"
          [ngClass]="mostrarContrasena ? 'pi-eye-slash' : 'pi-eye'"
          aria-hidden="true"
        ></i>
      </button>
    }
  </div>

  <div class="flex flex-col items-start space-y-2 pt-2">
    <button
      type="submit"
      [disabled]="loading"
      class="h-12 w-44 flex cursor-pointer items-center justify-center gap-2 rounded-full bg-[#2b5392] font-medium text-white shadow-[0_10px_25px_rgba(120,169,215,0.35)] transition-all duration-300 hover:bg-[#1a3a6b] disabled:cursor-not-allowed disabled:bg-gray-400 disabled:shadow-none"
    >
      @if (loading) {
        <span
          class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
        ></span>
      }
      <span>{{ loading ? "Ingresando..." : "Ingresar" }}</span>
    </button>

    <a
      routerLink="/login/forgot-password"
      class="text-sm font-medium text-[#2b5392] transition-colors hover:text-[#1a3a6b] hover:underline"
    >
      ¿Olvidaste tu contraseña?
    </a>
  </div>

  <!-- Error -->
  @if (error) {
    <p
      class="absolute -bottom-24 left-0 w-full rounded-md border border-[#B22222] bg-[#FEE2E2] px-5 py-4 text-[#B22222]"
    >
      {{ error }}
    </p>
  }
</form>
