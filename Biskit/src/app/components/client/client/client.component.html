<main
  class="screen-enter flex flex-col gap-8 mx-4 mb-10 mt-2 sm:mx-8 md:mx-12 lg:mx-20 xl:mx-60"
  [class.client-ready]="clientLoaded"
>
  <!-- Info cliente -->
  <app-client-info
    class="screen-enter-stagger"
    [client]="client"
  ></app-client-info>

  <!-- Mascotas -->
  <app-pets-section
    class="screen-enter-stagger"
    [client]="client"
    [pets]="pets"
  ></app-pets-section>
</main>
