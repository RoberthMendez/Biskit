<section class="flex flex-col items-center gap-6">
  <article class="text-[#4a4a4a] text-center">
    <h1 class="text-2xl sm:text-3xl md:text-4xl font-semibold tracking-wider">
      Tus Mascotas
    </h1>
    @if (pets && pets.length > 0) {
      <p class="text-[#8d8580dd] font-medium text-sm sm:text-base">
        Aquí puedes ver toda la información de tus mascotas y sus tratamientos
      </p>
    }
  </article>

  <!-- Sin mascotas -->
  @if (!pets || pets.length === 0) {
    <article
      class="card-mascota block h-auto w-full max-w-xs cursor-default rounded-2xl bg-[#FBFAF8] py-3 ring-1 ring-[#E7DED4] shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1 hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)] mx-auto"
    >
      <div
        class="h-full overflow-hidden rounded-2xl space-y-3 flex flex-col items-center py-10"
      >
        <div
          class="w-14 h-14 rounded-2xl bg-[#EEF2F7] flex items-center justify-center shrink-0"
        >
          <svg
            viewBox="0 0 20 20"
            class="h-9 w-9"
            xmlns="http://www.w3.org/2000/svg"
            fill="#2b5392"
          >
            <path
              d="M11.9 8.4c1.3 0 2.1-1.9 2.1-3.1 0-1-.5-2.2-1.5-2.2-1.3 0-2.1 1.9-2.1 3.1 0 1 .5 2.2 1.5 2.2zm-3.8 0c1 0 1.5-1.2 1.5-2.2C9.6 4.9 8.8 3 7.5 3 6.5 3 6 4.2 6 5.2c-.1 1.3.7 3.2 2.1 3.2zm7.4-1c-1.3 0-2.2 1.8-2.2 3.1 0 .9.4 1.8 1.3 1.8 1.3 0 2.2-1.8 2.2-3.1 0-.9-.5-1.8-1.3-1.8zm-8.7 3.1c0-1.3-1-3.1-2.2-3.1-.9 0-1.3.9-1.3 1.8 0 1.3 1 3.1 2.2 3.1.9 0 1.3-.9 1.3-1.8zm3.2-.2c-2 0-4.7 3.2-4.7 5.4 0 1 .7 1.3 1.5 1.3 1.2 0 2.1-.8 3.2-.8 1 0 1.9.8 3 .8.8 0 1.7-.2 1.7-1.3 0-2.2-2.7-5.4-4.7-5.4z"
            />
          </svg>
        </div>

        <div class="mx-2 flex flex-col gap-1 sm:mx-4">
          <h3
            class="text-center text-lg font-bold tracking-wider text-[#4a4a4a] sm:text-xl"
          >
            Sin mascotas
          </h3>
          <p class="text-center text-xs font-medium text-[#6D6155]">
            Tu veterinario puede registrarlas por ti
          </p>
        </div>
      </div>
    </article>
  }

  <!-- Con mascotas -->
  @if (pets && pets.length > 0) {
    <article
      class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 sm:mx-10 mb-10 gap-6 sm:gap-8 lg:gap-10"
    >
      @for (pet of pets; track $index) {
        <app-pet-card [pet]="pet" [client]="client"></app-pet-card>
      }
    </article>
  }
</section>
