<a
  [routerLink]="treatmentLink"
  [state]="state ?? undefined"
  [class]="itemClasses"
>
  <div class="h-auto w-0.5 min-w-0.5 shrink-0 self-stretch bg-[#2B5392]"></div>

  <div class="flex flex-col gap-1">
    <div class="flex items-center justify-between gap-1">
      @if (variant === "vet") {
        <p [class]="dateClasses">
          {{ tratamiento.pet.nombre! }}
        </p>
      }
      <span [class]="dateClasses">·</span>
      <p [class]="dateClasses">
        {{ tratamiento.fecha | date: "dd-MM-yyyy" }}
      </p>
    </div>

    <!-- Drogas -->
    <div [class]="drugGridClasses">
      @for (drugColumn of getDrugColumns(tratamiento.drogas); track $index) {
        <div class="flex flex-col gap-0.5">
          @for (d of drugColumn; track $index) {
            <p class="text-sm font-medium text-[#282828] truncate">
              {{ d.nombre }}
            </p>
          }
        </div>
      }
    </div>
  </div>
</a>
