<a
  [routerLink]="
    clientId != null && petId != null
      ? ['/client', clientId, 'pet', petId, 'tratamiento', t.id]
      : null
  "
  class="cursor-pointer mx-5 mb-3.25 flex items-stretch gap-2 rounded-lg p-2 transition hover:bg-blue-50"
>
  <div class="h-auto w-0.5 min-w-0.5 shrink-0 self-stretch bg-[#2B5392]"></div>

  <div class="flex flex-col gap-1">
    <!-- Fecha -->
    <p class="text-sm font-semibold text-[#8D8580]">
      {{ t.fecha | date: "dd-MM-yyyy" }}
    </p>

    <!-- Drogas -->
    <div
      class="custom-scroll grid max-h-16 gap-x-4 gap-y-2 pr-1"
      [class.grid-cols-1]="t.drogas.length <= 3"
      [class.grid-cols-2]="t.drogas.length > 3 && t.drogas.length <= 6"
      [class.grid-cols-3]="t.drogas.length > 6"
      [class.overflow-y-auto]="t.drogas.length > 9"
      [class.overflow-visible]="t.drogas.length <= 9"
    >
      @for (drugColumn of getDrugColumns(t.drogas); track $index) {
        <div class="flex flex-col gap-0.5">
          @for (d of drugColumn; track $index) {
            <p class="text-sm font-medium text-[#282828] truncate">
              {{ d.nombre }}
            </p>
          }
        </div>
      }
    </div>
  </div>
</a>
