<main>
  <app-back-button
    [label]="'Detalle de Cliente'"
    [ruta]="'/client'"
  ></app-back-button>

  <section
    class="screen-enter mx-auto mt-5 mb-10 grid w-full max-w-6xl grid-cols-1 items-center gap-8 px-5 sm:px-8 md:grid-cols-2 lg:grid-cols-3"
  >
    <!-- Card mascota -->
    <app-pet-card class="screen-enter-stagger" [pet]="pet"></app-pet-card>

    <!-- Tratamientos -->
    <aside
      class="screen-enter-stagger flex w-full lg:col-span-2"
      *ngIf="client.id"
    >
      <app-treatments-card
        [tratamientos]="pet.tratamientos ?? []"
        [routeBase]="['/client', client.id!]"
        [routeSegment]="'pet'"
        [entityId]="pet.id"
        [variant]="'client'"
        [title]="'Tratamientos de ' + pet.nombre"
        [listVariant]="'client'"
        class="w-full"
      ></app-treatments-card>
    </aside>
  </section>
</main>
