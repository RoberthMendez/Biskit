<div
  class="group flex flex-col overflow-hidden rounded-2xl border border-[#ece1d6] bg-[#FBFAF8] shadow-[0_4px_14px_rgba(29,48,75,0.06),0_1px_3px_rgba(0,0,0,0.04)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1.25 hover:border-[#d4c4b4] hover:bg-[#fffdf9] hover:shadow-[0_10px_22px_rgba(43,83,146,0.1),0_4px_8px_rgba(0,0,0,0.05)]"
>
  <img
    [src]="imagen"
    [alt]="titulo"
    class="h-48 w-full shrink-0 object-cover sm:h-56"
  />
  <div class="flex flex-1 flex-col justify-center px-4 py-3">
    <h3
      class="mb-2 text-center text-[0.95rem] font-semibold text-[#4a4a4a] transition-colors duration-300 group-hover:text-[#2b5392] sm:text-base"
    >
      {{ titulo }}
    </h3>
    <p
      class="text-center text-[0.8rem] leading-relaxed font-normal text-[#6d6155]"
    >
      {{ descripcion }}
    </p>
  </div>
</div>
